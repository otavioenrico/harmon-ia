<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#181818" media="(prefers-color-scheme: dark)" />
  <title>Harmon IA</title>
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/accent.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
</head>
<body>
  <div class="shell" id="shell">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <b class="brand-mark">✦</b><span>Harmon&nbsp;<b>IA</b></span>
        <button class="collapse-btn" id="collapse" title="Recolher menu"
                aria-label="Recolher menu" aria-expanded="true">☰</button>
      </div>
      <nav class="nav" id="nav" aria-label="Navegação principal"></nav>
      <div class="sidebar__user" id="user-footer"></div>
    </aside>

    <div class="content">
      <header class="header">
        <div class="header__left">
          <h1 class="header__title" id="header-title">…</h1>
        </div>
        <div class="header__actions" id="header-actions"></div>
      </header>
      <main class="module" id="module-root"></main>
    </div>
  </div>

  <!-- navegação mobile (≤900px): populada pelo app.js; CSS esconde no desktop -->
  <nav class="tabbar" id="tabbar" aria-label="Navegação principal" hidden></nav>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
